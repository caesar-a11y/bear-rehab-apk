name: Build Bear Rehab APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bear-rehab-apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Add Android platform
        run: npx cap add android
      - name: Bump version code (block old installs)
        run: |
          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 2/' android/app/build.gradle
          sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "2.0"/' android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle
      - name: Generate app icons (Baloo)
        run: npx @capacitor/assets generate --android || echo "assets step skipped"
      - name: Sync web assets
        run: npx cap sync android
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk BearRehab.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BearRehab-APK
          path: bear-rehab-apk/BearRehab.apk
      - name: Publish Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Bear Rehab APK (build ${{ github.run_number }})
          files: bear-rehab-apk/BearRehab.apk
